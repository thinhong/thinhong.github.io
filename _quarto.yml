project:
  type: website
  pre-render: cv/build-cv.R
  resources:
    - CNAME
    - img/blog-art
    - img/og-default.png
    - cv/cv.html
    - cv/cv.pdf
    - about/cv.html
  output-dir: docs

website:
  site-url: https://drthinhong.com
  image: /img/og-default.png
  open-graph: true
  twitter-card: true
  favicon: logo-icon.svg
  google-analytics: "G-RVRBE7Y1R2"
  back-to-top-navigation: true
  navbar:
    logo: logo-icon.svg
    left:
      - text: About
        href: about/index.qmd
      - text: Research
        href: research/index.qmd
      - text: Teaching
        href: teaching/index.qmd
      - text: Software
        href: software/index.qmd
      - text: Blog
        href: blog/index.qmd
    right:
      - icon: github
        href: https://github.com/thinhong
      - icon: linkedin
        href: https://www.linkedin.com/in/thinh-ong
  comments:
    giscus:
      repo: thinhong/thinhong.github.io
      repo-id: R_kgDOKL9B-g
        
format:
  html:
    theme: [cosmo, theme.scss]
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
      - theme-init.html
    include-after-body:
      - theme-toggle.html
      - nav-contact.html


